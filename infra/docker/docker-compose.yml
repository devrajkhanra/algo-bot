# algo-bot/infra/docker/docker-compose.yml

version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: algo-bot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    restart: unless-stopped

volumes:
  redis-data:
    name: algo-bot-redis-data