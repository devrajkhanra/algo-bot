syntax = "proto3";
package com.upstox.marketdatafeeder.rpc.proto;

message FeedResponse {
  enum Type {
    initial_feed = 0;
    live_feed = 1;
  }
  Type type = 1;
  map<string, Feed> feeds = 2;
}

message Feed {
  oneof FeedUnion {
    LTPC ltpc = 1;
    FullFeed fullFeed = 2;
    IndexFF indexFF = 3;
    OptionGreeks optionGreeks = 4;
  }
}

message LTPC {
  double ltp = 1;
  int64 ltt = 2;
  int64 ltq = 3;
  double cp = 4;
}

message FullFeed {
  LTPC marketFF = 1;
}

message IndexFF {
  LTPC marketFF = 1;
}

message OptionGreeks {
  double opPrice = 1;
  double vol = 2;
  double delta = 3;
  double theta = 4;
  double gamma = 5;
  double vega = 6;
  double rho = 7;
}